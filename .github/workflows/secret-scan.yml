# Gitleaks — secret scanner via the official CLI. Free, tokenless.
# Docs: https://github.com/gitleaks/gitleaks
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full-tree scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan working tree (no-git mode)
        # Scans the entire working tree. Does not depend on git diff semantics,
        # so it works reliably on a brand-new repository's first push.
        run: gitleaks detect --source . --no-git --redact --exit-code 1 --verbose

      - name: Scan full git history
        # Also scans historical commits for any secrets that were committed
        # and later removed. --log-opts tightens the scope to recent history.
        run: gitleaks detect --source . --redact --exit-code 1 --verbose
