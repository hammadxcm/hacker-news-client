# OSSF Scorecard — assesses this repo against open-source security best
# practices. Publishes results to GitHub's code-scanning tab.
# Docs: https://github.com/ossf/scorecard-action
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 9 * * 1" # weekly, Monday 09:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF
      id-token: write         # Sigstore keyless signing
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
