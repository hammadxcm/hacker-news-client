name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mock-server:
    name: Mock server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Mock server tests
        run: node --test test/*.test.js

  js:
    name: JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run tests
        working-directory: js
        run: node --test test/*.test.js

  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run tests
        working-directory: ts
        run: node --test --experimental-strip-types --disable-warning=ExperimentalWarning test/*.test.ts

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        working-directory: python
        run: python -m unittest discover tests

  ruby:
    name: Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: ruby
          bundler-cache: true
      - name: Run tests
        working-directory: ruby
        run: bundle exec rake test

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: go/go.sum
      - name: Run tests
        working-directory: go
        run: go test -race ./...

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run tests
        working-directory: rust
        run: cargo test --all-features

  verify:
    name: Cross-language verify.sh
    runs-on: ubuntu-latest
    needs: [mock-server, js, ts, python, ruby, go, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: ruby
          bundler-cache: true
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: go/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run verify.sh
        run: bash scripts/verify.sh
