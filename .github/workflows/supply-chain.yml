# Per-language vulnerability scanners, all free and tokenless.
# Runs on every PR + weekly to catch newly-disclosed CVEs.
name: Supply chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # weekly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Audit production + dev dependencies
        run: npm audit --audit-level=high

  python-audit:
    name: pip-audit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit + project
        working-directory: python
        run: |
          pip install pip-audit
          pip install -e ".[async]" || pip install -e .
      - name: Run pip-audit against installed environment
        run: pip-audit --strict --progress-spinner=off

  ruby-audit:
    name: bundler-audit (Ruby)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: ruby
          bundler-cache: true
      - name: Install bundler-audit
        run: gem install bundler-audit
      - name: Ensure Gemfile.lock exists (library policy: not committed)
        working-directory: ruby
        run: bundle install
      - name: Run bundler-audit
        working-directory: ruby
        run: bundle-audit update && bundle-audit check

  go-audit:
    name: govulncheck (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        working-directory: go
        run: govulncheck ./...

  rust-audit:
    name: cargo-audit (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Generate lockfile (library policy: not committed)
        working-directory: rust
        run: cargo generate-lockfile
      - name: Run cargo-audit
        working-directory: rust
        run: cargo audit

  dep-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
