name: Bug report
description: File a reproducible bug report.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out every field — incomplete reports slow us down.

        If this is a security vulnerability, please do **not** file a public issue. Use [GitHub Security Advisories](https://github.com/hammadkhan/hacker-news-client/security/advisories/new) instead.

  - type: dropdown
    id: language
    attributes:
      label: Language
      description: Which language library is affected?
      options:
        - JavaScript (js/)
        - TypeScript (ts/)
        - Python (python/)
        - Ruby (ruby/)
        - Go (go/)
        - Rust (rust/)
        - Multiple (describe in the body)
        - Shared (mock server / scripts / docs)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `cat VERSION` (or the installed package version)."
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime version
      description: "e.g. `node --version`, `python3 --version`, `ruby --version`, `go version`, `rustc --version`."
      placeholder: "node 22.12.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 arm64"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One- or two-sentence description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        The smallest piece of code that demonstrates the bug. If the bug
        requires a running API, show how you constructed the client.
      render: javascript
      placeholder: |
        import { HackerNewsClient } from 'hacker-news-client';
        const client = new HackerNewsClient();
        const item = await client.item(1);
        // ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exact error message / stack trace / output.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help — logs, screenshots, prior attempts.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions.
          required: true
        - label: I am on the latest released version (or have noted the version above).
          required: true
        - label: This is not a security vulnerability (those go to Security Advisories).
          required: true
